name: Build and Publish ShelfLife

on:
push:
branches:
- main
workflow_dispatch:
schedule:
- cron: '0 */6 * * *'

jobs:
check-upstream:
runs-on: ubuntu-latest

```
outputs:
  changed: ${{ steps.check.outputs.changed }}

steps:
  - name: Checkout fork
    uses: actions/checkout@v4

  - name: Check upstream commit
    id: check
    run: |
      UPSTREAM_SHA=$(git ls-remote https://github.com/hschaefer/ShelfLife.git refs/heads/main | cut -f1)
      LOCAL_SHA=$(git rev-parse HEAD)

      echo "Upstream: $UPSTREAM_SHA"
      echo "Local: $LOCAL_SHA"

      if [ "$UPSTREAM_SHA" != "$LOCAL_SHA" ]; then
        echo "changed=true" >> $GITHUB_OUTPUT
      else
        echo "changed=false" >> $GITHUB_OUTPUT
      fi
```

sync-and-build:
needs: check-upstream
if: needs.check-upstream.outputs.changed == 'true' || github.event_name != 'schedule'

```
runs-on: ubuntu-latest

permissions:
  contents: write
  packages: write

steps:
  - name: Checkout fork
    uses: actions/checkout@v4

  - name: Add upstream
    run: |
      git remote add upstream https://github.com/hschaefer/ShelfLife.git
      git fetch upstream
      git checkout main
      git merge upstream/main --no-edit

  - name: Push merged changes
    run: |
      git config user.name github-actions
      git config user.email github-actions@github.com
      git push origin main

  - name: Set up Docker Buildx
    uses: docker/setup-buildx-action@v3

  - name: Login to GHCR
    uses: docker/login-action@v3
    with:
      registry: ghcr.io
      username: ${{ github.actor }}
      password: ${{ secrets.GITHUB_TOKEN }}

  - name: Extract metadata
    id: meta
    uses: docker/metadata-action@v5
    with:
      images: ghcr.io/${{ github.repository_owner }}/shelflife
      tags: |
        type=raw,value=latest
        type=sha

  - name: Build and Push
    uses: docker/build-push-action@v6
    with:
      context: .
      push: true
      platforms: linux/amd64,linux/arm64
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
```
